<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>مكتب الصرفندي لخدمات المحكمة</title>
<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f5f5f5;
    padding: 50px;
}
h1 {
    color: #333;
}
button {
    width: 250px;
    padding: 15px;
    margin: 10px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}
.whatsapp {
    background-color: #25D366;
    color: white;
}
.payment {
    background-color: #007BFF;
    color: white;
}
</style>
</head>

<body>

<h1>مكتب الصرفندي لخدمات المحكمة</h1>

<button class="whatsapp" onclick="openWhatsApp()">تواصل واتساب</button>
<br>
<button class="payment" onclick="showPayment()">الدفع</button>

<div id="paymentOptions" style="display:none;">
    <h3>اختر طريقة الدفع:</h3>
    <button onclick="window.open('https://www.paypal.com')">PayPal</button>
    <button onclick="alert('Visa / Card قريبًا')">Visa / Card</button>
    <button onclick="alert('الدفع عند المكتب')">الدفع عند الاستلام</button>
</div>

<script>
function openWhatsApp() {
    window.open("https://wa.me/970595808334", "_blank");
}

function showPayment() {
    document.getElementById("paymentOptions").style.display = "block";
}
</script>

</body>
</html>
