<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>مكتب الصرفندي للخدمات العامة</title>

<style>
html, body {
    height: 100%;
    margin: 0;
    font-family: Arial;
    background: #f5f5f5;
}

/* تخطيط */
body {
    display: flex;
    flex-direction: column;
}

/* توسيط */
.mainContent {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* 🔥 العنوان كبير */
h1 {
    font-size: 42px;
    margin-bottom: 10px;
    color: #333;
    text-shadow: 2px 2px 5px #bbb;
}

h2 {
    font-size: 18px;
    margin-bottom: 25px;
    color: #555;
}

/* الأزرار */
button, input, select {
    width: 260px;
    padding: 12px;
    margin: 6px 0;
    border-radius: 10px;
    border: none;
    font-size: 15px;
}

button {
    background: #007BFF;
    color: white;
    cursor: pointer;
}

/* الفورم */
.form-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 10px;
}

/* النجمة */
.requiredStar::after {
    content: " *";
    color: red;
}

/* الفوتر */
footer {
    background: #007BFF;
    color: white;
    text-align: center;
    padding: 15px;
}

/* مودال */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
}

.modalContent {
    background: white;
    width: 90%;
    max-width: 400px;
    max-height: 70vh;
    overflow-y: auto;
    margin: 80px auto;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
}
</style>
</head>

<body>

<div class="mainContent">
    <h1>مكتب الصرفندي للخدمات العامة ومعاملات المحكمة</h1>
    <h2>خدمة الترجمة لجميع اللغات</h2>

    <button onclick="openWhatsApp()">تواصل واتساب</button>
    <button onclick="showPayment()">الدفع</button>
</div>

<!-- الدفع -->
<div id="paymentModal" class="modal">
    <div class="modalContent">
        <h3>اختر طريقة الدفع</h3>

        <button onclick="showBankModal()">تحويل من بنك</button>

        <!-- PayPal -->
        <form action="https://www.paypal.com/cgi-bin/webscr" method="post" target="_blank">
            <input type="hidden" name="cmd" value="_xclick">
            <input type="hidden" name="business" value="your-paypal-email@example.com">
            <input type="hidden" name="item_name" value="خدمات المحكمة">
            <input type="hidden" name="amount" value="10.00">
            <input type="hidden" name="currency_code" value="USD">
            <input type="submit" value="PayPal">
        </form>

        <button onclick="showCodModal()">الدفع عند الاستلام</button>

        <br>
        <button onclick="closePayment()">إغلاق</button>
    </div>
</div>

<!-- عند الاستلام -->
<div id="codModal" class="modal">
    <div class="modalContent">
        <p>نتمنى زيارتك قريبًا، شكرًا لثقتكم بنا</p>
        <button onclick="closeCodModal()">إغلاق</button>
    </div>
</div>

<!-- البنك -->
<div id="bankModal" class="modal">
    <div class="modalContent">

        <div class="form-group">
            <label class="requiredStar">البنك</label>
            <select id="bank">
                <option value="">اختر البنك</option>
                <option>بنك فلسطين</option>
                <option>البنك العربي</option>
                <option>بنك القاهرة عمان</option>
            </select>
        </div>

        <div class="form-group">
            <label class="requiredStar">المبلغ</label>
            <input type="number" id="amount" placeholder="ادخل المبلغ">
        </div>

        <div class="form-group">
            <label class="requiredStar">العملة</label>
            <select id="currency">
                <option value="">اختر العملة</option>
                <option>شيكل</option>
                <option>دولار</option>
                <option>دينار</option>
            </select>
        </div>

        <div class="form-group">
            <label class="requiredStar">رقم الحساب</label>
            <input type="text" id="account" placeholder="رقم الحساب">
        </div>

        <div class="form-group">
            <label class="requiredStar">رقم الآيبان</label>
            <input type="text" id="iban" placeholder="رقم الآيبان">
        </div>

        <button onclick="submitBank()">إرسال</button>
        <button onclick="closeBankModal()">إغلاق</button>
    </div>
</div>

<footer>
    <p>مكتب الصرفندي للخدمات العامة ومعاملات المحكمة</p>
    <p>هاتف: 970595808334</p>
    <p>رام الله - البالوع - مجمع المحاكم - مكتب الصرفندي</p>
    <p>حقوق النشر © 2026</p>
</footer>

<script>
function openWhatsApp(){
    window.open("https://wa.me/970595808334");
}

function showPayment(){
    document.getElementById("paymentModal").style.display = "block";
}
function closePayment(){
    document.getElementById("paymentModal").style.display = "none";
}

function showCodModal(){
    document.getElementById("codModal").style.display = "block";
}
function closeCodModal(){
    document.getElementById("codModal").style.display = "none";
}

function showBankModal(){
    closePayment();
    document.getElementById("bankModal").style.display = "block";
}
function closeBankModal(){
    document.getElementById("bankModal").style.display = "none";
}

function submitBank(){
    let bank = document.getElementById("bank").value;
    let amount = document.getElementById("amount").value;
    let currency = document.getElementById("currency").value;
    let account = document.getElementById("account").value;
    let iban = document.getElementById("iban").value;

    if(!bank || !amount || !currency || !account || !iban){
        alert("الرجاء تعبئة جميع الحقول المطلوبة");
        return;
    }

    alert("شكرا لثقتكم بنا");
}
</script>

</body>
</html>
